site_name: Enterprise Agentgateway Workshop
site_description: Hands-on labs for Solo.io Enterprise Agentgateway — routing, security, guardrails, MCP, and more.
site_url: https://rvennam.github.io/fe-enterprise-agentgateway-workshop/
repo_url: https://github.com/rvennam/fe-enterprise-agentgateway-workshop
repo_name: rvennam/fe-enterprise-agentgateway-workshop
edit_uri: edit/main/

docs_dir: .
site_dir: _site

exclude_docs: |
  /node_modules/
  /site/
  /.github/
  /.claude/
  /evaluations/
  /lib/
  /tmp/
  /temp/
  *.docx
  CHANGELOG.md
  Amex_*
  enterprise-agentgateway-workshop-full.md
  image-list.md

theme:
  name: material
  custom_dir: overrides
  logo: images/agentgateway-architecture.gif
  favicon: images/agentgateway-architecture.gif
  font: false
  palette:
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 3
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.critic
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde

plugins:
  - same-dir
  - search

extra_css:
  - stylesheets/solo-brand.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/rvennam/fe-enterprise-agentgateway-workshop
    - icon: fontawesome/solid/globe
      link: https://www.solo.io/

validation:
  nav:
    omitted_files: ignore
    not_found: warn
  links:
    not_found: warn
    absolute_links: ignore
    unrecognized_links: ignore

